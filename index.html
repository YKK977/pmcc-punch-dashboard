<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Yanbu SRU PMCC Punch Dashboard</title><style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#111827;--muted:#667085;--line:#e5e7eb;--blue:#1d4ed8;--navy:#0f2a55;--green:#16a34a;--amber:#f59e0b;--red:#ef4444;--gray:#94a3b8;--shadow:0 16px 40px rgba(16,24,40,.10)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#eaf1ff 0,#f8fbff 360px,var(--bg));font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,sans-serif;color:var(--ink)}.wrap{max-width:1280px;margin:0 auto;padding:26px 18px 50px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px}.brand h1{margin:0;font-size:34px;letter-spacing:-.045em}.brand p{margin:7px 0 0;color:var(--muted);font-size:14px}.badge{background:#0b2349;color:#fff;padding:10px 14px;border-radius:999px;font-weight:900;white-space:nowrap}.card{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}.meta{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:14px}.meta .card{padding:15px 18px}.label{font-size:12px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}.val{font-size:18px;font-weight:950;margin-top:5px}.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:14px}.kpi{padding:18px}.kpi .num{font-size:34px;font-weight:1000;letter-spacing:-.055em;margin-top:8px}.kpi .sub{font-size:12px;color:var(--muted);margin-top:5px}.hero{overflow:hidden;margin-bottom:14px}.heroHead{position:relative;padding:24px;background:linear-gradient(135deg,#071f44 0%,#1559d1 62%,#54a3ff 100%);color:#fff}.heroHead:after{content:"PR";position:absolute;right:24px;top:-32px;font-size:132px;font-weight:1000;opacity:.11;letter-spacing:-.08em}.heroHead h2{margin:8px 0 4px;font-size:30px;letter-spacing:-.04em}.scope{display:inline-flex;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.24);border-radius:999px;padding:6px 11px;font-weight:950;font-size:12px}.prGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:14px;background:#f6f8ff}.prBox{padding:16px;border-radius:18px;background:#fff;border:1px solid #e6ebf5}.prBox .big{font-size:35px;font-weight:1000;margin-top:8px}.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:14px;margin-bottom:14px}.section{padding:18px}.sectionTitle{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}.legend{display:flex;gap:12px;flex-wrap:wrap;margin:-2px 0 10px;color:var(--muted);font-size:12px}.legend span{display:inline-flex;align-items:center;gap:5px}.legend i{width:10px;height:10px;border-radius:999px;display:inline-block}.legend .rem{background:var(--blue)}.legend .req{background:var(--amber)}.legend .closed{background:var(--green)}.legend .clar{background:var(--red)}.legend .done{background:var(--gray)}.sectionTitle h3{margin:0;font-size:18px;letter-spacing:-.02em}.sectionTitle span{font-size:12px;color:var(--muted)}.pmccRow{display:grid;grid-template-columns:90px 1.2fr 1.3fr 70px;gap:12px;align-items:center;border-top:1px solid #edf0f5;padding:10px 0}.pmccRow:first-child{border-top:0}.desc{font-size:13px;color:#334155}.bar{height:16px;border-radius:999px;background:#e9eef6;overflow:hidden;display:flex}.seg.rem{background:var(--blue)}.seg.req{background:var(--amber)}.seg.closed{background:var(--green)}.seg.clar{background:var(--red)}.seg.done{background:var(--gray)}.status{font-size:12px;text-align:right;font-weight:900}.status.Completed{color:#64748b}.status.Active{color:#0f766e}.status.Planned{color:#64748b}.disc{display:grid;grid-template-columns:190px 1fr 60px;gap:10px;align-items:center;margin:9px 0}.disc.pr{background:#eaf3ff;border:1px solid #bfdbfe;border-radius:14px;padding:9px;margin-left:-8px;margin-right:-8px}.small{height:12px;border-radius:99px;background:#edf1f7;overflow:hidden}.small span{display:block;height:100%;background:linear-gradient(90deg,#6d5dfc,#1d4ed8)}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px 9px;border-bottom:1px solid #edf0f5;text-align:right;white-space:nowrap}th:first-child,td:first-child,th:nth-child(2),td:nth-child(2){text-align:left}th{font-size:11px;color:var(--muted);text-transform:uppercase}.admin{display:none;margin:0 0 14px;padding:14px;border:1px dashed #93c5fd;background:#eff6ff;border-radius:18px}.admin.show{display:block}.btn{display:inline-flex;align-items:center;gap:8px;border:0;border-radius:12px;background:#1d4ed8;color:#fff;padding:10px 14px;font-weight:900;cursor:pointer;margin-right:8px}.btn.secondary{background:#0f172a}.hint{color:#475569;font-size:13px;margin-top:8px}.error{padding:16px;background:#fff1f2;border:1px solid #fecdd3;color:#be123c;border-radius:16px;font-weight:800}@media(max-width:900px){.kpis,.prGrid{grid-template-columns:repeat(2,1fr)}.meta,.grid{grid-template-columns:1fr}.top{flex-direction:column}.pmccRow{grid-template-columns:80px 1fr}.pmccRow .bar,.pmccRow .status{grid-column:1/-1}.disc{grid-template-columns:1fr 1fr 50px}}@media(max-width:560px){.wrap{padding:18px 12px}.kpis,.prGrid{grid-template-columns:1fr}.brand h1{font-size:27px}}
</style></head><body><div class="wrap"><div class="top"><div class="brand"><h1>Yanbu SRU PMCC Punch Dashboard</h1><p>Based on <b>Summary by GS PIC</b> sheet</p></div><div class="badge" id="asOfBadge">Last Updated -</div></div><div class="admin" id="admin"><button class="btn" id="loadBtn">Load Source Excel</button><button class="btn secondary" id="exportBtn">Export dashboard.json</button><input id="file" type="file" accept=".xlsx,.xlsm,.xls" style="display:none"><div class="hint">Admin mode: Excel의 <b>Summary by GS PIC</b> 시트를 읽어서 dashboard.json만 생성합니다. 원본 Excel은 저장/업로드하지 않습니다.</div></div><div id="root"></div></div>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script><script>
const $=id=>document.getElementById(id), fmt=n=>Number(n||0).toLocaleString('en-US'), pct=(a,b)=>b?Math.max(0,Math.min(100,Number(a||0)/Number(b||0)*100)):0, esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));let DATA=null;if(new URLSearchParams(location.search).get('admin')==='1')$('admin').classList.add('show');
async function init(){try{const r=await fetch('data/dashboard.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('data/dashboard.json not found');DATA=await r.json();render(DATA)}catch(e){$('root').innerHTML='<div class="error">Dashboard data를 읽지 못했습니다. data/dashboard.json을 업로드하세요.</div>'}};
function render(d){const k=d.kpi||{},p=d.process||{},closeRate=pct(k.closed,k.total),comp=pct(p.closed,p.total),maxDisc=Math.max(...(d.discipline||[]).map(x=>x.value||0),1);$('asOfBadge').textContent='Last Updated '+(d.lastUpdated||'-');$('root').innerHTML=`<div class="meta"><div class="card"><div class="label">Source File</div><div class="val">${esc(d.sourceFile||'-')}</div></div></div><div class="kpis">${kpi('Total Punch',fmt(k.total),'Summary by GS PIC / Sub Total')}${kpi('Remaining',fmt(k.remaining),pct(k.remaining,k.total).toFixed(1)+'% of total')}${kpi('Close Requested',fmt(k.closeRequested),pct(k.closeRequested,k.total).toFixed(1)+'% of total')}${kpi('Closed',fmt(k.closed),pct(k.closed,k.total).toFixed(1)+'% of total')}${kpi('Completion',closeRate.toFixed(1)+'%','Closed / Total')}</div><div class="card hero"><div class="heroHead"><div class="scope">MY SCOPE · PROCESS ENGINEERING</div><h2>Process Engineering Status</h2></div><div class="prGrid">${pr('Open',fmt(p.open))}${pr('Close Requested',fmt(p.closeRequested))}${pr('Closed',fmt(p.closed))}${pr('Completion',comp.toFixed(1)+'%')}</div></div><div class="grid"><div class="card section"><div class="sectionTitle"><h3>PMCC Progress</h3><span>PMCC-01/02 fixed as Completed</span></div><div class="legend"><span><i class="rem"></i>Remaining</span><span><i class="req"></i>Close Requested</span><span><i class="closed"></i>Closed</span><span><i class="clar"></i>Clarification</span><span><i class="done"></i>Completed</span></div>${(d.pmcc||[]).map(pmccRow).join('')}</div><div class="card section"><div class="sectionTitle"><h3>GS PIC / Discipline Overview</h3><span>Remaining basis</span></div>${(d.discipline||[]).map((x,i)=>`<div class="disc ${x.isProcess?'pr':''}"><div>${x.isProcess?'⭐ ':''}${esc(x.name)}</div><div class="small"><span style="width:${pct(x.value,maxDisc)}%"></span></div><b>${fmt(x.value)}</b></div>`).join('')}</div></div><div class="card section"><div class="sectionTitle"><h3>Summary Table</h3><span>Unit: count</span></div><table><thead><tr><th>PMCC</th><th>Description</th><th>Status</th><th>Total</th><th>Remaining</th><th>Close Req.</th><th>Closed</th><th>Clarif.</th><th>PR</th></tr></thead><tbody>${(d.pmcc||[]).map(x=>`<tr><td><b>${esc(x.sn)}</b></td><td>${esc(x.description)}</td><td>${esc(x.status)}</td><td>${fmt(x.total)}</td><td>${fmt(x.remaining)}</td><td>${fmt(x.closeRequested)}</td><td>${fmt(x.closed)}</td><td>${fmt(x.clarification)}</td><td>${fmt(x.process)}</td></tr>`).join('')}</tbody></table></div>`}
function kpi(a,b,c){return `<div class="card kpi"><div class="label">${a}</div><div class="num">${b}</div><div class="sub">${c}</div></div>`}function pr(a,b){return `<div class="prBox"><div class="label">${a}</div><div class="big">${b}</div></div>`}function pmccRow(x){return `<div class="pmccRow"><b>${esc(x.sn)}</b><div class="desc">${esc(x.description)}</div><div class="bar">${x.status==='Completed'?`<span class="seg done" style="width:100%"></span>`:`<span class="seg rem" style="width:${pct(x.remaining,x.total)}%"></span><span class="seg req" style="width:${pct(x.closeRequested,x.total)}%"></span><span class="seg closed" style="width:${pct(x.closed,x.total)}%"></span><span class="seg clar" style="width:${pct(x.clarification,x.total)}%"></span>`}</div><div class="status ${esc(x.status)}">${esc(x.status)}</div></div>`}
const master=[['PMCC-01','TRS Tie-in','Completed'],['PMCC-02','Siren Tower Relocation','Completed'],['PMCC-03','SS-5','Planned'],['PMCC-04','SS-18','Planned'],['PMCC-05','PIB-1580','Planned'],['PMCC-06','PIB-1449','Planned'],['PMCC-07','Utility area for Instrument Air System','Planned'],['PMCC-08','Common Area OSBL','Planned'],['PMCC-09','SRU-2','Planned'],['PMCC-10','TGTU-2 & Common','Planned'],['PMCC-11','SRU-1','Planned'],['PMCC-12','TGTU-1','Planned'],['PMCC-13','Sour/Stripped Water Pump A Modification - V07','Planned'],['PMCC-14','Sour/Stripped Water Pump B Modification - V07','Planned']];
$('loadBtn')?.addEventListener('click',()=>$('file').click());$('file')?.addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;const wb=XLSX.read(await f.arrayBuffer(),{type:'array'});DATA=parseWorkbook(wb,f.name);render(DATA)});$('exportBtn')?.addEventListener('click',()=>{if(!DATA)return alert('먼저 Excel을 Load하세요.');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'}));a.download='dashboard.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)});
function norm(v){return String(v??'').replace(/\s+/g,' ').trim()}function num(v){if(v==null||v===''||v==='-')return 0;const n=Number(String(v).replace(/,/g,'').trim());return Number.isFinite(n)?Math.round(n):0}function colIndex(header,names){const clean=s=>norm(s).toLowerCase().replace(/[^a-z0-9가-힣]/g,'');const h=header.map(clean);for(const nm of names){const i=h.indexOf(clean(nm));if(i>=0)return i}return -1}
function parseWorkbook(wb,sourceFile){const sheetName=wb.SheetNames.find(n=>norm(n).toLowerCase()==='summary by gs pic')||wb.SheetNames.find(n=>/summary/i.test(n)&&/gs/i.test(n)&&/pic/i.test(n));if(!sheetName)throw new Error('Summary by GS PIC 시트를 찾지 못했습니다.');const ws=wb.Sheets[sheetName];const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});if(rows.length<2)throw new Error('Summary by GS PIC 시트에 데이터가 없습니다.');const h=rows[0];const c={pmcc:colIndex(h,['PMCC No.','PMCC No','PMCC']),cat:colIndex(h,['Category']),disc1:colIndex(h,['Discipline 1']),disc2:colIndex(h,['Discipline 2']),pic:colIndex(h,['PIC']),total:colIndex(h,['Total']),clar:colIndex(h,['Under Clarification']),remaining:colIndex(h,['Remaining']),closeReq:colIndex(h,['Close Requested']),closed:colIndex(h,['Closed'])};if([c.pmcc,c.total,c.clar,c.remaining,c.closeReq,c.closed].some(i=>i<0))throw new Error('Summary by GS PIC의 필수 컬럼을 찾지 못했습니다.');const get=r=>({total:num(r[c.total]),clarification:num(r[c.clar]),remaining:num(r[c.remaining]),closeRequested:num(r[c.closeReq]),closed:num(r[c.closed])});const isPmcc=s=>/^PMCC-\d+/i.test(norm(s));const overallRow=rows.find(r=>/^sub\s*total$/i.test(norm(r[c.pmcc])));if(!overallRow)throw new Error('Summary by GS PIC에서 Sub Total 행을 찾지 못했습니다.');const krow=get(overallRow);const pmccAgg={};const discAgg={};let proc={total:0,open:0,closeRequested:0,closed:0,clarification:0};for(const r of rows.slice(1)){const sn=norm(r[c.pmcc]).toUpperCase();if(!isPmcc(sn))continue;const g=get(r);pmccAgg[sn]??={total:0,remaining:0,closeRequested:0,closed:0,clarification:0,process:0};for(const key of ['total','remaining','closeRequested','closed','clarification'])pmccAgg[sn][key]+=g[key];const d1=norm(r[c.disc1]||''), d2=norm(r[c.disc2]||''), name=d1&&d2&&d1!==d2?`${d1} / ${d2}`:(d2||d1||'N/A');discAgg[name]??={name,value:0,isProcess:false};discAgg[name].value+=g.remaining;if(d2.toLowerCase()==='process'){discAgg[name].isProcess=true;proc.total+=g.total;proc.open+=g.remaining;proc.closeRequested+=g.closeRequested;proc.closed+=g.closed;proc.clarification+=g.clarification;pmccAgg[sn].process+=g.total;}}
const pmcc=master.map(([sn,description,baseStatus])=>{const a=pmccAgg[sn]||{total:0,remaining:0,closeRequested:0,closed:0,clarification:0,process:0};return {sn,description,status:baseStatus==='Completed'?'Completed':(a.total>0?'Active':'Planned'),...a}});let discipline=Object.values(discAgg).filter(x=>x.value>0).sort((a,b)=>b.value-a.value);discipline.sort((a,b)=>(b.isProcess?1:0)-(a.isProcess?1:0)||b.value-a.value);return {sourceBasis:'Summary by GS PIC',sourceFile,lastUpdated:new Date().toISOString().slice(0,10),kpi:{total:krow.total,remaining:krow.remaining,closeRequested:krow.closeRequested,closed:krow.closed,clarification:krow.clarification},process:proc,pmcc,discipline}}
init();</script></body></html>
